services:

  db:
    image: postgres:16-alpine
    container_name: kgpt-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kgpt
      POSTGRES_PASSWORD: kgpt
      POSTGRES_DB: kgpt
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kgpt"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: kgpt-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Point the backend at the compose Postgres service (overrides .env).
      DATABASE_URL: postgresql+asyncpg://kgpt:kgpt@db:5432/kgpt
    restart: unless-stopped

volumes:
  pgdata:
