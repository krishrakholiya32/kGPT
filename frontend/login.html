<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kGPT — Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>kGPT</h1>
      <p>Your Private AI Assistant</p>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</div>
    </div>

    <div id="auth-error" class="auth-error"></div>

    <!-- Login Form -->
    <div id="form-login">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="Enter your username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px" onclick="login()">
        Sign In →
      </button>
    </div>

    <!-- Register Form -->
    <div id="form-register" style="display:none">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="Choose a username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="Your email address" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Choose a password" autocomplete="new-password">
        <p style="font-size:12px;color:var(--text-muted);margin-top:6px">
          At least 8 characters, including an uppercase letter, a lowercase letter, a number, and a special character.
        </p>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px" onclick="register()">
        Create Account →
      </button>
    </div>
  </div>
</div>

<script>
  const API = '';

  // Redirect if already logged in
  if (localStorage.getItem('kgpt_token')) {
    window.location.href = '/index.html';
  }

  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
    hideError();
  }

  function showError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg;
    el.classList.add('show');
  }

  function hideError() {
    document.getElementById('auth-error').classList.remove('show');
  }

  // FastAPI returns `detail` as a string for HTTPExceptions, but as a list of
  // error objects for request-validation (422) errors. Handle both.
  function extractError(data, fallback) {
    const d = data && data.detail;
    if (!d) return fallback;
    if (typeof d === 'string') return d;
    if (Array.isArray(d)) {
      const msgs = d
        .map(e => (e && e.msg ? e.msg.replace(/^Value error,\s*/i, '') : ''))
        .filter(Boolean);
      return msgs.length ? msgs.join(' ') : fallback;
    }
    return fallback;
  }

  async function login() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    if (!username || !password) return showError('Please fill in all fields.');

    const form = new URLSearchParams();
    form.append('username', username);
    form.append('password', password);

    try {
      const res = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: form
      });
      const data = await res.json();
      if (!res.ok) return showError(extractError(data, 'Login failed.'));
      localStorage.setItem('kgpt_token', data.access_token);
      window.location.href = '/index.html';
    } catch (e) {
      showError('Connection error. Make sure the server is running.');
    }
  }

  async function register() {
    const username = document.getElementById('reg-username').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    if (!username || !email || !password) return showError('Please fill in all fields.');

    try {
      const res = await fetch(`${API}/api/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();
      if (!res.ok) return showError(extractError(data, 'Registration failed.'));
      localStorage.setItem('kgpt_token', data.access_token);
      window.location.href = '/index.html';
    } catch (e) {
      showError('Connection error. Make sure the server is running.');
    }
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const tab = document.getElementById('tab-login').classList.contains('active') ? 'login' : 'register';
      tab === 'login' ? login() : register();
    }
  });
</script>
</body>
</html>
