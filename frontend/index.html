<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kGPT — Your Private AI Assistant</title>
  <link rel="stylesheet" href="/css/style.css?v=16">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<div class="app-layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <button class="new-chat-btn" onclick="newConversation()">
      <span class="icon">➕</span> New Chat
    </button>

    <div class="conv-list" id="conv-list"></div>

    <div class="sidebar-bottom">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">?</div>
        <div>
          <div class="user-name" id="user-name">Loading...</div>
        </div>
      </div>
      <button class="btn btn-secondary btn-sm" style="width:100%;justify-content:center" onclick="logout()">
        Sign Out
      </button>
      <button class="collapse-sidebar-btn" onclick="toggleDesktopSidebar()" title="Collapse sidebar">‹ Hide</button>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main style="overflow:hidden;display:flex;flex-direction:column">

    <!-- Chat Header -->
    <div class="chat-header">
      <div class="chat-header-left">
        <button class="mobile-menu-btn" id="mobile-menu-btn" onclick="toggleSidebar()" title="Menu">☰</button>
        <button class="expand-sidebar-btn" id="expand-sidebar-btn" onclick="toggleDesktopSidebar()" title="Show sidebar" style="display:none">›</button>
        <h2>kGPT</h2>
      </div>
      <div class="chat-header-actions">
        <button class="theme-toggle-btn-header" id="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
          <span class="theme-icon">🌙</span>
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages-container">
      <div class="chat-messages" id="messages">
        <div class="empty-state">
          <div class="big-icon">🧠</div>
          <h3>Welcome to kGPT</h3>
          <p>One clean input box. kGPT automatically decides whether to answer directly or search the web.</p>

          <div class="suggestions-grid">
            <div class="suggestion-card" onclick="useHint('Search for the latest AI news')">
              <div class="suggestion-icon">🌐</div>
              <div class="suggestion-title">Web Search</div>
              <div class="suggestion-text">"Search for the latest AI news"</div>
            </div>
            <div class="suggestion-card" onclick="useHint('Explain how neural networks work')">
              <div class="suggestion-icon">🧠</div>
              <div class="suggestion-title">General Chat</div>
              <div class="suggestion-text">"Explain how neural networks work"</div>
            </div>
            <div class="suggestion-card" onclick="triggerFileInput()">
              <div class="suggestion-icon">📎</div>
              <div class="suggestion-title">Documents</div>
              <div class="suggestion-text">Attach PDF, DOCX, or images</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
      <div class="input-container-centered">
        <div class="input-row">
          <button class="attach-btn" id="attach-btn" onclick="triggerFileInput()" title="Attach file (jpg, png, pdf, docx)"></button>
          <div class="input-wrapper">
            <textarea
              id="chat-input"
              rows="1"
              placeholder="Ask kGPT anything..."
            ></textarea>
          </div>
          <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">➤</button>
        </div>
      </div>
    </div>
    <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.pdf,.docx" multiple style="display:none" onchange="handleFileSelect(event)">

  </main>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<script src="/js/chat.js?v=19"></script>

</body>
</html>
