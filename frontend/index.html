<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kGPT — Your Private AI Assistant</title>
  <link rel="stylesheet" href="/css/style.css?v=6">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>

<div class="app-layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <button class="new-chat-btn" onclick="newConversation()">
      <span class="icon">➕</span> New Chat
    </button>

    <div class="conv-list" id="conv-list"></div>

    <div class="sidebar-bottom">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">?</div>
        <div>
          <div class="user-name" id="user-name">Loading...</div>
        </div>
      </div>
      <button class="btn btn-secondary btn-sm" style="width:100%;justify-content:center" onclick="logout()">
        Sign Out
      </button>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main style="overflow:hidden;display:flex;flex-direction:column">

    <!-- Chat Header -->
    <div class="chat-header">
      <div class="chat-header-left">
        <h2>kGPT</h2>
      </div>
      <div class="chat-header-actions">
        <button class="theme-toggle-btn-header" id="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
          <span class="theme-icon">🌙</span>
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages-container">
      <div class="chat-messages" id="messages">
        <div class="empty-state">
          <div class="big-icon">🧠</div>
          <h3>Welcome to kGPT</h3>
          <p>One clean input box. kGPT automatically decides whether to answer directly or search the web.</p>

          <div class="suggestions-grid">
            <div class="suggestion-card" onclick="useHint('Search for the latest AI news')">
              <div class="suggestion-icon">🌐</div>
              <div class="suggestion-title">Web Search</div>
              <div class="suggestion-text">"Search for the latest AI news"</div>
            </div>
            <div class="suggestion-card" onclick="useHint('Explain how neural networks work')">
              <div class="suggestion-icon">🧠</div>
              <div class="suggestion-title">General Chat</div>
              <div class="suggestion-text">"Explain how neural networks work"</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
      <div class="input-container-centered">
        <div class="attachment-pill" id="attachment-pill" style="display:none">
          <span class="attachment-pill-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </span>
          <span id="attachment-pill-name"></span>
          <button class="attachment-remove" id="attachment-remove" onclick="removeAttachment()" title="Remove attachment">×</button>
        </div>
        <div class="input-row">
          <button class="attach-btn" id="attach-btn" onclick="triggerFileInput()" title="Attach file (jpg, png, pdf, docx)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <div class="input-wrapper">
            <textarea
              id="chat-input"
              rows="1"
              placeholder="Ask kGPT anything..."
            ></textarea>
          </div>
          <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">➤</button>
        </div>
      </div>
    </div>
    <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.pdf,.docx" style="display:none" onchange="handleFileSelect(event)">

  </main>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<script src="/js/chat.js?v=9"></script>

</body>
</html>
